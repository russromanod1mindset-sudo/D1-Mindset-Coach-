<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0D1B4E" />
    <title>D1 Mindset Coach+</title>
    <link rel="manifest" href="/manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #07102a; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
      #root { max-width: 430px; margin: 0 auto; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script>
      Babel.registerPreset('custom', {
        presets: [['env'], ['react']]
      });
    </script>
    <script type="text/babel" data-presets="custom" src="/D1MindsetCoach.jsx"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        function tryRender() {
          if (window.App && window.ReactDOM) {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(React.createElement(window.App));
          } else {
            setTimeout(tryRender, 200);
          }
        }
        setTimeout(tryRender, 1000);
      });
    </script>
  </body>
